name: Generate Snake Animation

on:
  schedule:
    # اجرا هر ۱۲ ساعت (اختیاری: می‌توانید به "0 0 * * *" کاهش دهید)
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # تولید دو نسخه SVG: روشن و تاریک
      - name: Generate Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # انتشار روی شاخه output بدون هیچ اکشن ثالث
      - name: Push to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan output
          git rm -rf .
          # کپی فایل‌های تولیدی به ریشه temp
          cp dist/github-snake.svg /tmp/snake.svg
          cp dist/github-snake-dark.svg /tmp/snake-dark.svg
          # برگرداندن احتمالی پوشه workflow برای بعد (اختیاری)
          git checkout main -- .github 2>/dev/null || true
          cp /tmp/snake.svg github-snake.svg
          cp /tmp/snake-dark.svg github-snake-dark.svg
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Update snake animation [skip ci]" || echo "No changes to commit"
          git push origin output --force
