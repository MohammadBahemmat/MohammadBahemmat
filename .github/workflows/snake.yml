name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ۱. حتماً مخزن را checkout کن
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      # ۲. تنظیمات Git را انجام بده (برای commit کردن)
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ۳. تولید فایل SVG
      - name: Generate the snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MohammadBahemmat
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # ۴. انتشار فایل‌ها روی شاخه output
      - name: Push generated SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # توکن پیش‌فرض خود گیتهاب
