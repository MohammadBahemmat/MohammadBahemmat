name: Metrics
on:
  schedule:
    - cron: "0 */8 * * *"   # هر ۸ ساعت
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub Metrics
        id: metrics   # ⬅️ حتماً id داشته باشد تا به خروجی‌ها دسترسی پیدا کنیم
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          output_action: none
          committer_message: "Update metrics [skip ci]"
          user: MohammadBahemmat
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tehran
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4
          plugin_languages_threshold: 2%
          plugin_lines: yes
          plugin_lines_delay: 30
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          plugin_stars: yes
          plugin_stars_limit: 3
          plugin_topics: yes
          plugin_topics_limit: 8
          plugin_topics_mode: icons
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 4
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_sections: repositories
          filename: metrics.svg
          config_output: svg

      # ⬇️ مرحله جدید: ذخیره کردن SVG خروجی در یک فایل
      - name: Save metrics SVG to file
        run: echo "${{ steps.metrics.outputs.svg }}" > metrics.svg

      - name: Commit & Push metrics to output branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan output
          git rm -rf .
          cp metrics.svg /tmp/metrics.svg
          git checkout main -- .github || true
          cp /tmp/metrics.svg metrics.svg
          git add metrics.svg
          git commit -m "Update metrics [skip ci]" || echo "No changes to commit"
          git push origin output --force
